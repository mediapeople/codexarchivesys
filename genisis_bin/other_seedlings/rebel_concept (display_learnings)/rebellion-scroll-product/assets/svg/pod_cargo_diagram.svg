<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pod and Sacred Cargo diagram">
  <defs>
    <style>
      .grid{stroke:#2a2620;stroke-width:1;opacity:.45}
      .s{stroke:#8a8480;stroke-width:2;fill:none}
      .sd{stroke:#5c5450;stroke-width:2;fill:none;opacity:.85}
      .a{stroke:#c4623a;stroke-width:2;fill:none}
      .g{stroke:#c9963a;stroke-width:2;fill:none}
      .gf{fill:#c9963a}
      .lbl{font-family:Space Mono,monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;fill:#8a8480}
      .lbls{fill:#f4f0e8}
    </style>
  </defs>
  <g>
    <line class="grid" x1="40" y1="50" x2="860" y2="50"/>
    <line class="grid" x1="40" y1="130" x2="860" y2="130"/>
    <line class="grid" x1="40" y1="210" x2="860" y2="210"/>
  </g>
  <rect x="120" y="55" width="660" height="150" rx="75" class="sd"/>
  <rect x="295" y="88" width="310" height="84" rx="42" class="s"/>
  <circle cx="450" cy="130" r="10" class="gf"/>
  <line x1="780" y1="92" x2="845" y2="92" class="a"/>
  <text x="855" y="96" class="lbl" text-anchor="end">POD</text>
  <line x1="605" y1="168" x2="845" y2="168" class="g"/>
  <text x="855" y="172" class="lbl lbls" text-anchor="end">SACRED CARGO</text>
  <line x1="450" y1="130" x2="450" y2="218" class="g"/>
  <text x="450" y="242" class="lbl lbls" text-anchor="middle">HUMAN</text>
  <text x="55" y="92" class="lbl">OUTER SHELL</text>
  <text x="55" y="114" class="lbl">TEMPORARY</text>
  <text x="55" y="168" class="lbl">INNER LIFE</text>
  <text x="55" y="190" class="lbl lbls">PRIMARY</text>
</svg>
