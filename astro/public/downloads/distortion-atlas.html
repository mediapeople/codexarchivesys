<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ The Distortion Atlas ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #07060a;
    --bg2: #0e0b0f;
    --gold: #c8a855;
    --gold-bright: #f0d070;
    --gold-dim: #7a6030;
    --cream: #f0e8d0;
    --cream-dim: #a09070;
    --horizon: #e85530;
    --horizon-dark: #8b1500;
    --horizon-dim: #4a1800;
    --forge: #d4922a;
    --forge-dark: #3a2500;
    --forge-dim: #2a1800;
    --lens: #4a9fd4;
    --lens-dark: #002040;
    --lens-dim: #001428;
    --field: #5ab45a;
    --field-dark: #0a2a0a;
    --field-dim: #051405;
    --witness: #f0e8d0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'IM Fell English', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ===== LAYOUT ===== */
  .page {
    display: grid;
    grid-template-columns: 1fr 420px;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px;
    gap: 0;
  }

  .header {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 0 32px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 20px auto 0;
  }

  .title-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(18px, 2.5vw, 28px);
    letter-spacing: 0.15em;
    color: var(--cream);
    text-shadow: 0 0 40px rgba(200, 168, 85, 0.4);
    animation: titleReveal 2s ease-out forwards;
  }

  .title-sub {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.5em;
    color: var(--gold-dim);
    margin-top: 8px;
    animation: titleReveal 2s ease-out 0.3s both;
  }

  @keyframes titleReveal {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== MAP CONTAINER ===== */
  .map-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #atlas-svg {
    width: 100%;
    max-width: 680px;
    height: auto;
    filter: drop-shadow(0 0 60px rgba(200, 168, 85, 0.06));
    animation: mapReveal 1.5s ease-out 0.5s both;
  }

  @keyframes mapReveal {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Guardian hover states */
  .guardian-node {
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .guardian-node .node-bg {
    transition: all 0.25s ease;
  }

  .guardian-node:hover .node-bg,
  .guardian-node.active .node-bg {
    filter: brightness(1.5);
  }

  .guardian-node .node-ring {
    transition: all 0.25s ease;
  }

  .guardian-node:hover .node-ring,
  .guardian-node.active .node-ring {
    stroke-opacity: 1 !important;
    stroke-width: 2 !important;
  }

  .guardian-node .node-outer {
    transition: all 0.3s ease;
    stroke-opacity: 0;
  }

  .guardian-node:hover .node-outer,
  .guardian-node.active .node-outer {
    stroke-opacity: 0.6 !important;
  }

  .guardian-node .node-label {
    transition: opacity 0.2s;
  }

  /* Pulse animation for active node */
  @keyframes nodePulse {
    0%, 100% { r: 35; opacity: 0.3; }
    50% { r: 45; opacity: 0.1; }
  }

  .guardian-node.active .pulse-ring {
    animation: nodePulse 2s ease-in-out infinite;
  }

  /* Witness center */
  .witness-node {
    cursor: pointer;
  }

  @keyframes witnessRotate {
    from { transform: rotate(0deg); transform-origin: 500px 500px; }
    to { transform: rotate(360deg); transform-origin: 500px 500px; }
  }

  .witness-orbit {
    animation: witnessRotate 20s linear infinite;
    transform-origin: 500px 500px;
  }

  @keyframes witnessGlow {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.3; }
  }

  .witness-glow {
    animation: witnessGlow 3s ease-in-out infinite;
  }

  /* ===== PANEL ===== */
  .panel {
    padding: 32px 24px 32px 32px;
    border-left: 1px solid rgba(200, 168, 85, 0.1);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    max-height: calc(100vh - 160px);
    position: sticky;
    top: 32px;
  }

  .panel::-webkit-scrollbar { width: 3px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  .panel-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    opacity: 0.35;
    text-align: center;
    gap: 16px;
  }

  .panel-empty-glyph {
    font-size: 32px;
    color: var(--gold-dim);
  }

  .panel-empty-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--cream-dim);
    line-height: 1.8;
    max-width: 200px;
  }

  .panel-content {
    display: none;
    animation: panelReveal 0.4s ease-out forwards;
  }

  .panel-content.visible {
    display: block;
  }

  @keyframes panelReveal {
    from { opacity: 0; transform: translateX(12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .panel-zone-tag {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.4em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-zone-tag::before {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
  }

  .panel-ring-tag {
    font-family: 'IM Fell English SC', serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--cream-dim);
    margin-bottom: 20px;
    opacity: 0.6;
  }

  .panel-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(16px, 1.8vw, 22px);
    letter-spacing: 0.08em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .panel-alias {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--cream-dim);
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  .panel-divider {
    width: 100%;
    height: 1px;
    margin: 18px 0;
    background: linear-gradient(90deg, currentColor, transparent);
    opacity: 0.2;
  }

  .panel-section-label {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.5em;
    margin-bottom: 10px;
    opacity: 0.5;
  }

  .panel-origin {
    font-size: 13px;
    line-height: 1.9;
    color: var(--cream-dim);
    font-style: italic;
  }

  .panel-confession {
    font-size: 13px;
    line-height: 2;
    font-style: italic;
    padding-left: 14px;
    border-left: 2px solid currentColor;
    opacity: 0.85;
  }

  .panel-witness {
    font-size: 13px;
    line-height: 2.1;
  }

  .panel-witness p {
    position: relative;
    padding-left: 16px;
  }

  .panel-witness p::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--gold-dim);
    opacity: 0.7;
  }

  .panel-sovereign {
    font-size: 13px;
    line-height: 1.9;
    font-style: italic;
    color: var(--cream-dim);
    text-align: right;
  }

  .panel-sovereign strong {
    font-style: normal;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    display: block;
    text-align: right;
    margin-bottom: 6px;
    opacity: 0.5;
  }

  .seam-note {
    font-size: 11px;
    line-height: 1.8;
    padding: 10px 12px;
    border: 1px solid rgba(200, 168, 85, 0.15);
    background: rgba(200, 168, 85, 0.03);
    font-style: italic;
    color: var(--cream-dim);
    margin: 12px 0;
  }

  /* Witness panel special */
  .witness-panel .panel-name {
    color: var(--cream);
    text-align: center;
  }

  .witness-panel .panel-origin {
    text-align: center;
    font-size: 14px;
  }

  /* ===== LEGEND ===== */
  .legend {
    grid-column: 1 / -1;
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 24px 0 16px;
    border-top: 1px solid rgba(200, 168, 85, 0.08);
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--cream-dim);
    opacity: 0.5;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
  }

  .legend-line {
    width: 20px;
    height: 1px;
    background: currentColor;
    border: none;
    opacity: 0.5;
  }

  .legend-dash {
    width: 20px;
    height: 1px;
    background: repeating-linear-gradient(90deg, currentColor 0, currentColor 3px, transparent 3px, transparent 6px);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .page {
      grid-template-columns: 1fr;
      padding: 20px;
    }
    .panel {
      border-left: none;
      border-top: 1px solid rgba(200, 168, 85, 0.1);
      padding: 24px 0 0;
      position: static;
      max-height: none;
    }
    .legend { display: none; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <header class="header">
    <h1 class="title-main">✦ The Distortion Atlas ✦</h1>
    <p class="title-sub">A Cartography of Inner Misperception</p>
  </header>

  <!-- MAP -->
  <main class="map-container">
    <svg id="atlas-svg" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stop-color="#0e0b0f"/>
          <stop offset="100%" stop-color="#030205"/>
        </radialGradient>
        <radialGradient id="gHorizon" cx="75%" cy="25%" r="55%">
          <stop offset="0%" stop-color="#7a1800" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gForge" cx="25%" cy="25%" r="55%">
          <stop offset="0%" stop-color="#6b4500" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gLens" cx="25%" cy="75%" r="55%">
          <stop offset="0%" stop-color="#003866" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gField" cx="75%" cy="75%" r="55%">
          <stop offset="0%" stop-color="#0f3b0f" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="witnessBg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1a1408"/>
          <stop offset="100%" stop-color="#0a0805"/>
        </radialGradient>
        <radialGradient id="witnessGlowGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#f0d070" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#c8a855" stop-opacity="0"/>
        </radialGradient>
        <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fDeepGlow" x="-150%" y="-150%" width="400%" height="400%">
          <feGaussianBlur stdDeviation="14" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fText">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="mainClip">
          <circle cx="500" cy="500" r="420"/>
        </clipPath>
        <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
          <circle cx="14" cy="14" r="0.5" fill="#f0e8d0" fill-opacity="0.07"/>
        </pattern>
      </defs>

      <!-- Background -->
      <circle cx="500" cy="500" r="500" fill="url(#bg)"/>
      <circle cx="500" cy="500" r="420" fill="url(#dots)"/>

      <!-- Zone fills -->
      <g clip-path="url(#mainClip)">
        <path d="M500,500 L920,500 A420,420 0 0,0 500,80 Z" fill="url(#gHorizon)"/>
        <path d="M500,500 L500,80 A420,420 0 0,0 80,500 Z" fill="url(#gForge)"/>
        <path d="M500,500 L80,500 A420,420 0 0,0 500,920 Z" fill="url(#gLens)"/>
        <path d="M500,500 L500,920 A420,420 0 0,0 920,500 Z" fill="url(#gField)"/>
      </g>

      <!-- Rings -->
      <circle cx="500" cy="500" r="370" fill="none" stroke="#f0e8d0" stroke-width="0.5" stroke-opacity="0.1" stroke-dasharray="5,8"/>
      <circle cx="500" cy="500" r="285" fill="none" stroke="#f0e8d0" stroke-width="0.5" stroke-opacity="0.14" stroke-dasharray="4,7"/>
      <circle cx="500" cy="500" r="200" fill="none" stroke="#f0e8d0" stroke-width="0.6" stroke-opacity="0.18" stroke-dasharray="3,6"/>
      <circle cx="500" cy="500" r="118" fill="none" stroke="#f0e8d0" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="3,5"/>
      <circle cx="500" cy="500" r="420" fill="none" stroke="#f0e8d0" stroke-width="1.2" stroke-opacity="0.4"/>
      <circle cx="500" cy="500" r="425" fill="none" stroke="#f0e8d0" stroke-width="0.3" stroke-opacity="0.12"/>

      <!-- Zone lines -->
      <line x1="500" y1="80" x2="500" y2="920" stroke="#f0e8d0" stroke-width="0.7" stroke-opacity="0.18"/>
      <line x1="80" y1="500" x2="920" y2="500" stroke="#f0e8d0" stroke-width="0.7" stroke-opacity="0.18"/>
      <line x1="203" y1="203" x2="797" y2="797" stroke="#f0e8d0" stroke-width="0.25" stroke-opacity="0.05"/>
      <line x1="797" y1="203" x2="203" y2="797" stroke="#f0e8d0" stroke-width="0.25" stroke-opacity="0.05"/>

      <!-- Ring labels -->
      <text x="875" y="496" font-family="Cinzel, serif" font-size="7.5" fill="#f0e8d0" letter-spacing="2" opacity="0.28">IV</text>
      <text x="789" y="496" font-family="Cinzel, serif" font-size="7.5" fill="#f0e8d0" letter-spacing="2" opacity="0.28">III</text>
      <text x="704" y="496" font-family="Cinzel, serif" font-size="7.5" fill="#f0e8d0" letter-spacing="2" opacity="0.28">II</text>
      <text x="622" y="496" font-family="Cinzel, serif" font-size="7.5" fill="#f0e8d0" letter-spacing="2" opacity="0.25">I</text>

      <!-- Zone labels -->
      <text x="710" y="116" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#e85530" letter-spacing="6" filter="url(#fText)" opacity="0.9">HORIZON</text>
      <text x="710" y="131" text-anchor="middle" font-family="Cinzel, serif" font-size="7.5" fill="#c84020" letter-spacing="3" opacity="0.55">FIRE &amp; AIR</text>
      <text x="290" y="116" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#d4922a" letter-spacing="6" filter="url(#fText)" opacity="0.9">FORGE</text>
      <text x="290" y="131" text-anchor="middle" font-family="Cinzel, serif" font-size="7.5" fill="#a87020" letter-spacing="3" opacity="0.55">STONE &amp; IRON</text>
      <text x="290" y="882" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#4a9fd4" letter-spacing="6" filter="url(#fText)" opacity="0.9">LENS</text>
      <text x="290" y="897" text-anchor="middle" font-family="Cinzel, serif" font-size="7.5" fill="#3070a0" letter-spacing="3" opacity="0.55">WATER &amp; FOG</text>
      <text x="710" y="882" text-anchor="middle" font-family="Cinzel, serif" font-size="14" fill="#5ab45a" letter-spacing="6" filter="url(#fText)" opacity="0.9">FIELD</text>
      <text x="710" y="897" text-anchor="middle" font-family="Cinzel, serif" font-size="7.5" fill="#3a8040" letter-spacing="3" opacity="0.55">EARTH &amp; LIGHT</text>

      <!-- Warp seam between Engine & Oracle -->
      <line id="seam-engine-oracle" x1="558" y1="442" x2="600" y2="322" stroke="#e85530" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,4"/>
      <!-- Warp seam between Veil & Minimizer -->
      <line id="seam-veil-min" x1="400" y1="675" x2="296" y2="704" stroke="#4a9fd4" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,4"/>

      <!-- Warp point markers -->
      <g filter="url(#fGlow)" opacity="0.7">
        <circle cx="500" cy="130" r="6" fill="none" stroke="#f0e8d0" stroke-width="0.8" stroke-opacity="0.6"/>
        <circle cx="500" cy="130" r="2.5" fill="none" stroke="#f0e8d0" stroke-width="0.5" stroke-opacity="0.4"/>
        <circle cx="500" cy="130" r="1" fill="#f0e8d0" fill-opacity="0.6"/>
        <circle cx="130" cy="500" r="6" fill="none" stroke="#f0e8d0" stroke-width="0.8" stroke-opacity="0.6"/>
        <circle cx="130" cy="500" r="2.5" fill="none" stroke="#f0e8d0" stroke-width="0.5" stroke-opacity="0.4"/>
        <circle cx="130" cy="500" r="1" fill="#f0e8d0" fill-opacity="0.6"/>
        <circle cx="500" cy="870" r="6" fill="none" stroke="#f0e8d0" stroke-width="0.8" stroke-opacity="0.6"/>
        <circle cx="500" cy="870" r="2.5" fill="none" stroke="#f0e8d0" stroke-width="0.5" stroke-opacity="0.4"/>
        <circle cx="500" cy="870" r="1" fill="#f0e8d0" fill-opacity="0.6"/>
        <circle cx="870" cy="500" r="6" fill="none" stroke="#f0e8d0" stroke-width="0.8" stroke-opacity="0.6"/>
        <circle cx="870" cy="500" r="2.5" fill="none" stroke="#f0e8d0" stroke-width="0.5" stroke-opacity="0.4"/>
        <circle cx="870" cy="500" r="1" fill="#f0e8d0" fill-opacity="0.6"/>
      </g>
      <text x="500" y="152" text-anchor="middle" font-family="Cinzel, serif" font-size="6" fill="#f0e8d0" letter-spacing="2" opacity="0.25">WARP</text>
      <text x="870" y="520" text-anchor="middle" font-family="Cinzel, serif" font-size="6" fill="#f0e8d0" letter-spacing="2" opacity="0.25">WARP</text>
      <text x="500" y="856" text-anchor="middle" font-family="Cinzel, serif" font-size="6" fill="#f0e8d0" letter-spacing="2" opacity="0.25">WARP</text>

      <!-- ===== GUARDIAN NODES ===== -->

      <!-- CATASTROPHE ENGINE -->
      <g class="guardian-node" data-id="engine" filter="url(#fGlow)">
        <circle class="pulse-ring" cx="558" cy="442" r="35" fill="none" stroke="#e85530" stroke-width="0.5" stroke-opacity="0"/>
        <circle class="node-outer" cx="558" cy="442" r="38" fill="none" stroke="#e85530" stroke-width="1" stroke-dasharray="2,4"/>
        <circle class="node-bg" cx="558" cy="442" r="30" fill="#8b1500" fill-opacity="0.88" stroke="none"/>
        <circle class="node-ring" cx="558" cy="442" r="30" fill="none" stroke="#e85530" stroke-width="1.8" stroke-opacity="0.9"/>
        <text class="node-label" x="558" y="437" text-anchor="middle" font-family="Cinzel, serif" font-size="7.5" fill="#f0e8d0" letter-spacing="0.3" pointer-events="none">CATASTROPHE</text>
        <text class="node-label" x="558" y="448" text-anchor="middle" font-family="Cinzel, serif" font-size="7.5" fill="#f0e8d0" letter-spacing="0.3" pointer-events="none">ENGINE</text>
        <text class="node-label" x="558" y="460" text-anchor="middle" font-family="Cinzel, serif" font-size="5.5" fill="#e85530" letter-spacing="1" opacity="0.7" pointer-events="none">I · CORE</text>
      </g>

      <!-- ORACLE OF CERTAINTY -->

let activeNode = null;

function renderPanel(id) {
  const data = GUARDIANS[id];
  if (!data) return;

  const isWitness = id === 'witness';
  const content = document.getElementById('panel-content');
  const empty = document.getElementById('panel-empty');

  empty.style.display = 'none';
  content.classList.remove('visible');

  setTimeout(() => {
    let html = `
      <div class="panel-zone-tag" style="color: ${data.zoneColor}; --zone-color: ${data.zoneColor}">
        <span style="background: ${data.zoneColor}; display:block; width:20px; height:1px;"></span>
        ${data.zone}
      </div>
      <div class="panel-ring-tag">${data.ring}</div>
      <div class="panel-name" style="color: ${data.zoneColor}">${data.name}</div>
      <div class="panel-alias">Alias: ${data.alias}</div>
    `;

    if (!isWitness) {
      html += `
        <div class="panel-divider" style="color: ${data.zoneColor}"></div>
        <div class="panel-section-label" style="color: ${data.zoneColor}">ORIGIN BLESSING</div>
        <div class="panel-origin">${data.origin}</div>
      `;

      if (data.confession && data.confession.length) {
        html += `
          <div class="panel-divider" style="color: ${data.zoneColor}"></div>
          <div class="panel-section-label" style="color: ${data.zoneColor}">CONFESSION</div>
          <div class="panel-confession" style="color: ${data.zoneColor}; border-color: ${data.zoneColor}">
            ${data.confession.map(c => `<p>${c}</p>`).join('')}
          </div>
        `;
      }

      html += `
        <div class="panel-divider" style="color: ${data.zoneColor}"></div>
        <div class="panel-section-label" style="color: ${data.zoneColor}">WITNESS RITE</div>
        <div class="panel-witness" style="color: ${data.zoneColor}">
          ${data.witness.map(w => `<p>${w}</p>`).join('')}
        </div>
        <div class="panel-divider" style="color: ${data.zoneColor}"></div>
        <div class="panel-section-label" style="color: ${data.zoneColor}">SOVEREIGN FORM</div>
        <div class="panel-sovereign">
          ${data.sovereign.split('\n').join('<br>')}
        </div>
      `;

      if (data.seam) {
        html += `
          <div class="panel-divider" style="color: ${data.zoneColor}"></div>
          <div class="seam-note">⟡ ${data.seam}</div>
        `;
      }
    } else {
      // Witness special layout
      html += `
        <div class="panel-divider" style="color: ${data.zoneColor}"></div>
        <div class="panel-origin" style="text-align:center">${data.origin}</div>
        <div class="panel-divider" style="color: ${data.zoneColor}"></div>
        <div class="panel-section-label" style="color: ${data.zoneColor}; text-align:center">THE RETURN</div>
        <div class="panel-witness" style="color: ${data.zoneColor}; text-align:center">
          ${data.witness.map(w => `<p style="padding-left:0">${w}</p>`).join('')}
        </div>
        <div class="panel-divider" style="color: ${data.zoneColor}"></div>
        <div class="panel-sovereign" style="text-align:center; font-size:14px; line-height:2">
          ${data.sovereign.split('\n').join('<br>')}
        </div>
      `;
    }

    content.innerHTML = html;
    content.classList.add('visible');
  }, 50);
}

function setActive(id) {
  // Remove old active
  if (activeNode) {
    const old = document.querySelector(`.guardian-node[data-id="${activeNode}"], .witness-node[data-id="${activeNode}"]`);
    if (old) old.classList.remove('active');
  }

  // Set new active
  const node = document.querySelector(`.guardian-node[data-id="${id}"], .witness-node[data-id="${id}"]`);
  if (node) node.classList.add('active');
  activeNode = id;

  renderPanel(id);
}

// Attach click events
document.querySelectorAll('.guardian-node, .witness-node').forEach(node => {
  node.addEventListener('click', () => {
    const id = node.getAttribute('data-id');
    setActive(id);
  });

  // Tooltip on hover — subtle coordinate highlight
  node.addEventListener('mouseenter', () => {
    node.style.cursor = 'pointer';
  });
});

// Click outside to deselect
document.getElementById('atlas-svg').addEventListener('click', (e) => {
  if (!e.target.closest('.guardian-node') && !e.target.closest('.witness-node')) {
    if (activeNode) {
      const old = document.querySelector(`.guardian-node[data-id="${activeNode}"], .witness-node[data-id="${activeNode}"]`);
      if (old) old.classList.remove('active');
      activeNode = null;
      document.getElementById('panel-empty').style.display = '';
      document.getElementById('panel-content').classList.remove('visible');
    }
  }
});

// Initial reveal animation — stagger nodes
document.querySelectorAll('.guardian-node').forEach((node, i) => {
  node.style.opacity = '0';
  node.style.transition = `opacity 0.5s ease ${0.8 + i * 0.1}s`;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      node.style.opacity = '1';
    });
  });
});
</script>
