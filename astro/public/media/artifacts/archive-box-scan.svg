<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Archive Box Scan Plate</title>
  <desc id="desc">Top scan of an archive box with stamped paper fragments and index marks.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e0d4b7"/>
      <stop offset="100%" stop-color="#c7b38e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="#23262f"/>
  <rect x="140" y="120" width="920" height="560" rx="16" fill="url(#paper)"/>
  <g stroke="#3d2b1f" stroke-width="6" fill="none" opacity="0.65">
    <rect x="220" y="210" width="220" height="140"/>
    <rect x="510" y="195" width="290" height="175"/>
    <rect x="300" y="410" width="180" height="150"/>
    <rect x="545" y="430" width="250" height="120"/>
    <rect x="830" y="250" width="150" height="280"/>
  </g>
  <g fill="#8b2d2d" opacity="0.58" font-family="Avenir Next, Helvetica, sans-serif" font-size="42" font-weight="700">
    <text x="250" y="300">PRESSURE</text>
    <text x="555" y="305">MEMORY</text>
    <text x="330" y="505">INDEX</text>
  </g>
  <text x="160" y="90" fill="#f0e5cc" font-size="36" font-family="Avenir Next, Helvetica, sans-serif" letter-spacing="4">ARCHIVE BOX  SCAN</text>
</svg>
