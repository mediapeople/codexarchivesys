<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Deck Under Load II Detail</title>
  <desc id="desc">Close crop detail mock showing sealed collage edge and pressure skin texture.</desc>
  <defs>
    <linearGradient id="base" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a202b"/>
      <stop offset="100%" stop-color="#2c1621"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f6d785"/>
      <stop offset="100%" stop-color="#dc7a57"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <rect width="36" height="36" fill="none"/>
      <path d="M36 0 H0 V36" stroke="#f5e5bc" stroke-opacity="0.24"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#base)"/>
  <rect x="120" y="120" width="960" height="560" rx="24" fill="url(#skin)"/>
  <rect x="120" y="120" width="960" height="560" rx="24" fill="url(#grid)"/>
  <g fill="#222938" opacity="0.4">
    <path d="M180 220 h300 v120 h-300z"/>
    <path d="M510 260 h240 v80 h-240z"/>
    <path d="M780 210 h220 v170 h-220z"/>
    <path d="M250 400 h190 v170 h-190z"/>
    <path d="M470 420 h300 v130 h-300z"/>
    <path d="M800 430 h140 v120 h-140z"/>
  </g>
  <text x="150" y="90" fill="#f6ead0" font-size="34" font-family="Avenir Next, Helvetica, sans-serif" letter-spacing="4">DECK UNDER LOAD II  DETAIL</text>
</svg>
