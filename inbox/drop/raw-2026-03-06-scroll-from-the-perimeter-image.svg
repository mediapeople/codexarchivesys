<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">A Scroll from the Perimeter - field card</title>
  <desc id="desc">Dark field card with archival border and excerpt text from the poem.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0c0a" />
      <stop offset="100%" stop-color="#141410" />
    </linearGradient>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#d3cb9d" opacity="0.1" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#grain)" />

  <rect x="72" y="72" width="1456" height="756" rx="4" ry="4" fill="none" stroke="#2a2a1a" stroke-width="2" />
  <line x1="72" y1="180" x2="1528" y2="180" stroke="#2a2a1a" stroke-width="2" />

  <text x="108" y="140" fill="#c8a84b" font-family="Courier New, Courier, monospace" font-size="26" letter-spacing="5">SCROLL FIELD CARD</text>
  <text x="108" y="248" fill="#7a7a52" font-family="Courier New, Courier, monospace" font-size="20" letter-spacing="2">A SCROLL FROM THE PERIMETER</text>

  <text x="108" y="355" fill="#e4ddb0" font-family="Courier New, Courier, monospace" font-size="48" font-style="italic">
    <tspan x="108" dy="0">"The current flickers.</tspan>
    <tspan x="108" dy="64">The current holds."</tspan>
  </text>

  <text x="108" y="560" fill="#ccc8a0" font-family="Courier New, Courier, monospace" font-size="28" font-style="italic">
    <tspan x="108" dy="0">"We are not healed.</tspan>
    <tspan x="108" dy="42">We are conducting."</tspan>
  </text>

  <text x="108" y="760" fill="#4a4a30" font-family="Courier New, Courier, monospace" font-size="18" letter-spacing="2">INTAKE VISUAL PLACEHOLDER // 2026-03-06</text>
</svg>
